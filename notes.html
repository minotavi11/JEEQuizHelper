<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JEE Notes Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-top: #fdf5e6;
      --bg-bottom: #d9eefb;
      --ink: #102a43;
      --ink-soft: #486581;
      --card: #ffffffdf;
      --accent: #d64545;
      --accent-2: #1d7a8c;
      --line: #bcccdc;
      --pill: #e8f3f6;
      --shadow: 0 18px 45px rgba(16, 42, 67, 0.14);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 12% 20%, #fff4dc 0%, transparent 32%),
                  radial-gradient(circle at 80% 84%, #bee6f8 0%, transparent 30%),
                  linear-gradient(170deg, var(--bg-top), var(--bg-bottom));
    }

    body {
      animation: fadeIn 420ms ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .app {
      width: min(1160px, 94vw);
      margin: 26px auto 34px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      backdrop-filter: blur(6px);
      border: 1px solid #ffffff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 26px 24px;
      background: linear-gradient(118deg, #102a43, #1d7a8c 68%, #3e8fb0);
      color: #f0f7ff;
      position: relative;
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -8% -85% auto;
      width: 320px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff26, #ffffff00 70%);
      z-index: -1;
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.45rem, 2.5vw, 2.1rem);
      letter-spacing: 0.02em;
      line-height: 1.15;
    }

    .description {
      margin: 0;
      color: #ddedf8;
      line-height: 1.45;
    }

    .toolbar {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .mode-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
      color: #fff;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active {
      transform: translateY(0);
    }

    .tab-btn {
      background: #5b7083;
    }

    .tab-btn.active {
      background: var(--accent);
    }

    .btn-alt {
      background: var(--accent-2);
    }

    .btn-ghost {
      color: var(--ink);
      background: #e6edf3;
    }

    .hint {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.95rem;
    }

    .category-picker {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #f8fbfe;
      display: none;
      gap: 8px;
    }

    .category-picker.visible {
      display: grid;
      animation: riseIn 220ms ease;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .category-grid {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.35;
      color: var(--ink);
    }

    input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--accent-2);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--ink-soft);
      font-size: 0.92rem;
    }

    .stats span {
      border: 1px solid #d6e2ea;
      border-radius: 999px;
      padding: 4px 10px;
      background: #f8fcff;
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.visible {
      display: grid;
      gap: 14px;
    }

    .chapter-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }

    .chapter-head {
      padding: 12px 14px;
      font-weight: 700;
      background: #f5faff;
      border-bottom: 1px solid #dce8f2;
    }

    .item-grid {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .item-card {
      border: 1px solid #d8e5ee;
      border-radius: 12px;
      background: #fcfeff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .term {
      margin: 0;
      font-size: 1.02rem;
    }

    .pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--pill);
      color: #165a69;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      padding: 4px 9px;
    }

    .meta {
      color: #5f7387;
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .body-text {
      margin: 0;
      line-height: 1.5;
      color: #1d3348;
      white-space: pre-wrap;
    }

    .memory {
      margin: 0;
      border-left: 4px solid #8cb9cc;
      background: #f7fbff;
      border-radius: 8px;
      padding: 9px 10px;
      color: #334e68;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .category-section {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .category-title {
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #165a69;
    }

    .split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-panel {
      border: 1px solid #d8e5ee;
      border-radius: 12px;
      padding: 10px;
      background: #fcfeff;
      display: grid;
      gap: 8px;
    }

    .mini-title {
      margin: 0;
      font-size: 0.9rem;
      color: #3a596f;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .error {
      color: #b42318;
      background: #fff4f3;
      border: 1px solid #ffd4ce;
      border-radius: 10px;
      padding: 10px;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .empty {
      border: 1px dashed #c8d7e3;
      border-radius: 12px;
      background: #f8fbfe;
      padding: 12px;
      color: var(--ink-soft);
      font-size: 0.94rem;
    }

    @media (max-width: 860px) {
      .split-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .app {
        width: min(100%, 96vw);
        margin-top: 14px;
      }

      .hero,
      .toolbar,
      .content {
        padding: 14px;
      }

      .mode-row {
        display: grid;
        grid-template-columns: 1fr;
      }

      .mode-row button {
        width: 100%;
      }

      .item-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel hero">
      <h1 id="notesTitle">Loading notes...</h1>
      <p id="notesDescription" class="description">Please wait while notes are loaded from notes.json.</p>
    </section>

    <section class="panel toolbar">
      <div class="mode-row" role="tablist" aria-label="Notes view tabs">
        <button class="tab-btn active" id="tabSimple" type="button" role="tab" aria-selected="true">Simple Term - Memory Hook</button>
        <button class="tab-btn" id="tabFull" type="button" role="tab" aria-selected="false">Full Notes</button>
        <button class="tab-btn" id="tabCategory" type="button" role="tab" aria-selected="false">By Category (Both)</button>
      </div>

      <p class="hint">Category filter applies to every tab, just like selecting question categories.</p>

      <div class="mode-row">
        <button class="btn-alt" id="toggleCategoryBtn" type="button">Select Categories</button>
        <button class="btn-ghost" id="selectAllCategoriesBtn" type="button">Select All</button>
        <button class="btn-ghost" id="clearAllCategoriesBtn" type="button">Clear All</button>
      </div>

      <div class="category-picker" id="categoryPicker">
        <div class="category-grid" id="categoryList"></div>
      </div>

      <div class="stats" id="statsLine"></div>
      <p id="errorBox" class="error"></p>
    </section>

    <section class="panel content">
      <section class="tab-pane visible" id="paneSimple" role="tabpanel" aria-labelledby="tabSimple"></section>
      <section class="tab-pane" id="paneFull" role="tabpanel" aria-labelledby="tabFull"></section>
      <section class="tab-pane" id="paneCategory" role="tabpanel" aria-labelledby="tabCategory"></section>
    </section>
  </main>

  <script>
    const TYPE_ORDER = ["specification", "concept", "component", "annotation", "api", "reference", "tool"];

    const state = {
      title: "",
      description: "",
      chapters: [],
      terms: [],
      categories: [],
      activeTab: "simple"
    };

    const el = {
      notesTitle: document.getElementById("notesTitle"),
      notesDescription: document.getElementById("notesDescription"),
      tabSimple: document.getElementById("tabSimple"),
      tabFull: document.getElementById("tabFull"),
      tabCategory: document.getElementById("tabCategory"),
      paneSimple: document.getElementById("paneSimple"),
      paneFull: document.getElementById("paneFull"),
      paneCategory: document.getElementById("paneCategory"),
      toggleCategoryBtn: document.getElementById("toggleCategoryBtn"),
      selectAllCategoriesBtn: document.getElementById("selectAllCategoriesBtn"),
      clearAllCategoriesBtn: document.getElementById("clearAllCategoriesBtn"),
      categoryPicker: document.getElementById("categoryPicker"),
      categoryList: document.getElementById("categoryList"),
      statsLine: document.getElementById("statsLine"),
      errorBox: document.getElementById("errorBox")
    };

    function showError(message) {
      el.errorBox.textContent = message;
      el.errorBox.classList.add("visible");
    }

    function clearError() {
      el.errorBox.textContent = "";
      el.errorBox.classList.remove("visible");
    }

    function cleanType(value) {
      return (value || "uncategorized").trim().toLowerCase();
    }

    function normalizeTerms(chapters) {
      const terms = [];
      chapters.forEach((chapterObj) => {
        const chapterName = chapterObj.chapter || "Unknown Chapter";
        const chapterTerms = Array.isArray(chapterObj.terms) ? chapterObj.terms : [];
        chapterTerms.forEach((entry, idx) => {
          terms.push({
            key: `${chapterName}::${entry.term || "term"}::${idx}`,
            chapter: chapterName,
            term: entry.term || "Untitled term",
            type: cleanType(entry.type),
            definition: (entry.definition || "").trim(),
            memory_hook: (entry.memory_hook || "").trim()
          });
        });
      });
      return terms;
    }

    function typeSortValue(type) {
      const idx = TYPE_ORDER.indexOf(type);
      return idx === -1 ? TYPE_ORDER.length + 1 : idx;
    }

    function buildCategories(terms) {
      const counts = new Map();
      terms.forEach((item) => {
        counts.set(item.type, (counts.get(item.type) || 0) + 1);
      });

      return Array.from(counts.entries())
        .map(([type, count]) => ({ type, count }))
        .sort((a, b) => {
          const byOrder = typeSortValue(a.type) - typeSortValue(b.type);
          return byOrder !== 0 ? byOrder : a.type.localeCompare(b.type);
        });
    }

    function renderCategoryPicker() {
      el.categoryList.innerHTML = "";
      state.categories.forEach((cat, index) => {
        const id = `cat-${index}`;
        const wrapper = document.createElement("label");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = id;
        checkbox.value = cat.type;
        checkbox.checked = true;

        checkbox.addEventListener("change", () => {
          renderAllPanes();
        });

        const text = document.createElement("span");
        text.textContent = `${cat.type} (${cat.count})`;

        wrapper.appendChild(checkbox);
        wrapper.appendChild(text);
        el.categoryList.appendChild(wrapper);
      });
    }

    function getSelectedCategories() {
      const selected = Array.from(el.categoryList.querySelectorAll("input[type='checkbox']"))
        .filter((cb) => cb.checked)
        .map((cb) => cb.value);
      return new Set(selected);
    }

    function getFilteredTerms() {
      const selected = getSelectedCategories();
      if (selected.size === 0) {
        return [];
      }
      return state.terms.filter((item) => selected.has(item.type));
    }

    function makeEmpty(message) {
      const box = document.createElement("div");
      box.className = "empty";
      box.textContent = message;
      return box;
    }

    function renderStats(filteredTerms) {
      const chapterSet = new Set(filteredTerms.map((t) => t.chapter));
      const stats = [
        `Visible terms: ${filteredTerms.length}/${state.terms.length}`,
        `Chapters: ${chapterSet.size}/${state.chapters.length}`,
        `Categories selected: ${getSelectedCategories().size}/${state.categories.length}`
      ];

      el.statsLine.innerHTML = "";
      stats.forEach((stat) => {
        const chip = document.createElement("span");
        chip.textContent = stat;
        el.statsLine.appendChild(chip);
      });
    }

    function groupByChapter(terms) {
      const map = new Map();
      terms.forEach((item) => {
        if (!map.has(item.chapter)) {
          map.set(item.chapter, []);
        }
        map.get(item.chapter).push(item);
      });
      return map;
    }

    function makeItemCard(item, fullMode) {
      const card = document.createElement("article");
      card.className = "item-card";

      const top = document.createElement("div");
      top.className = "item-top";

      const termTitle = document.createElement("h3");
      termTitle.className = "term";
      termTitle.textContent = item.term;

      const pills = document.createElement("div");
      pills.className = "pills";

      const typePill = document.createElement("span");
      typePill.className = "pill";
      typePill.textContent = item.type;
      pills.appendChild(typePill);

      top.appendChild(termTitle);
      top.appendChild(pills);
      card.appendChild(top);

      if (fullMode) {
        const definition = document.createElement("p");
        definition.className = "body-text";
        definition.textContent = item.definition || "Definition not available.";
        card.appendChild(definition);
      }

      const memory = document.createElement("p");
      memory.className = "memory";
      memory.textContent = `Memory Hook: ${item.memory_hook || "No memory hook available."}`;
      card.appendChild(memory);

      const meta = document.createElement("p");
      meta.className = "meta";
      meta.textContent = `Chapter: ${item.chapter}`;
      card.appendChild(meta);

      return card;
    }

    function renderSimplePane(filteredTerms) {
      el.paneSimple.innerHTML = "";
      if (filteredTerms.length === 0) {
        el.paneSimple.appendChild(makeEmpty("No terms for the current category selection."));
        return;
      }

      const grouped = groupByChapter(filteredTerms);
      grouped.forEach((items, chapterName) => {
        const chapterCard = document.createElement("section");
        chapterCard.className = "chapter-card";

        const head = document.createElement("div");
        head.className = "chapter-head";
        head.textContent = chapterName;

        const grid = document.createElement("div");
        grid.className = "item-grid";

        items.forEach((item) => {
          grid.appendChild(makeItemCard(item, false));
        });

        chapterCard.appendChild(head);
        chapterCard.appendChild(grid);
        el.paneSimple.appendChild(chapterCard);
      });
    }

    function renderFullPane(filteredTerms) {
      el.paneFull.innerHTML = "";
      if (filteredTerms.length === 0) {
        el.paneFull.appendChild(makeEmpty("No terms for the current category selection."));
        return;
      }

      const grouped = groupByChapter(filteredTerms);
      grouped.forEach((items, chapterName) => {
        const chapterCard = document.createElement("section");
        chapterCard.className = "chapter-card";

        const head = document.createElement("div");
        head.className = "chapter-head";
        head.textContent = chapterName;

        const grid = document.createElement("div");
        grid.className = "item-grid";

        items.forEach((item) => {
          grid.appendChild(makeItemCard(item, true));
        });

        chapterCard.appendChild(head);
        chapterCard.appendChild(grid);
        el.paneFull.appendChild(chapterCard);
      });
    }

    function renderCategoryPane(filteredTerms) {
      el.paneCategory.innerHTML = "";
      if (filteredTerms.length === 0) {
        el.paneCategory.appendChild(makeEmpty("No terms for the current category selection."));
        return;
      }

      const selectedCategories = Array.from(getSelectedCategories()).sort((a, b) => {
        const byOrder = typeSortValue(a) - typeSortValue(b);
        return byOrder !== 0 ? byOrder : a.localeCompare(b);
      });

      selectedCategories.forEach((categoryName) => {
        const categoryTerms = filteredTerms.filter((item) => item.type === categoryName);
        if (categoryTerms.length === 0) {
          return;
        }

        const section = document.createElement("section");
        section.className = "category-section";

        const title = document.createElement("h2");
        title.className = "category-title";
        title.textContent = `${categoryName} (${categoryTerms.length})`;

        const split = document.createElement("div");
        split.className = "split-grid";

        const simplePanel = document.createElement("div");
        simplePanel.className = "mini-panel";
        const simpleTitle = document.createElement("h3");
        simpleTitle.className = "mini-title";
        simpleTitle.textContent = "Simple Term - Memory Hook";
        simplePanel.appendChild(simpleTitle);

        const fullPanel = document.createElement("div");
        fullPanel.className = "mini-panel";
        const fullTitle = document.createElement("h3");
        fullTitle.className = "mini-title";
        fullTitle.textContent = "Full Notes";
        fullPanel.appendChild(fullTitle);

        categoryTerms.forEach((item) => {
          const simpleCard = document.createElement("article");
          simpleCard.className = "item-card";
          const simpleTerm = document.createElement("h4");
          simpleTerm.className = "term";
          simpleTerm.textContent = item.term;
          const simpleMemory = document.createElement("p");
          simpleMemory.className = "memory";
          simpleMemory.textContent = `Memory Hook: ${item.memory_hook || "No memory hook available."}`;
          simpleCard.appendChild(simpleTerm);
          simpleCard.appendChild(simpleMemory);
          simplePanel.appendChild(simpleCard);

          const fullCard = makeItemCard(item, true);
          fullPanel.appendChild(fullCard);
        });

        split.appendChild(simplePanel);
        split.appendChild(fullPanel);
        section.appendChild(title);
        section.appendChild(split);
        el.paneCategory.appendChild(section);
      });
    }

    function applyActiveTab() {
      const tabEntries = [
        { id: "simple", tab: el.tabSimple, pane: el.paneSimple },
        { id: "full", tab: el.tabFull, pane: el.paneFull },
        { id: "category", tab: el.tabCategory, pane: el.paneCategory }
      ];

      tabEntries.forEach((entry) => {
        const active = entry.id === state.activeTab;
        entry.tab.classList.toggle("active", active);
        entry.tab.setAttribute("aria-selected", String(active));
        entry.pane.classList.toggle("visible", active);
      });
    }

    function renderAllPanes() {
      clearError();
      const filteredTerms = getFilteredTerms();
      renderStats(filteredTerms);
      renderSimplePane(filteredTerms);
      renderFullPane(filteredTerms);
      renderCategoryPane(filteredTerms);
      applyActiveTab();
    }

    function attachEvents() {
      el.tabSimple.addEventListener("click", () => {
        state.activeTab = "simple";
        applyActiveTab();
      });

      el.tabFull.addEventListener("click", () => {
        state.activeTab = "full";
        applyActiveTab();
      });

      el.tabCategory.addEventListener("click", () => {
        state.activeTab = "category";
        applyActiveTab();
      });

      el.toggleCategoryBtn.addEventListener("click", () => {
        el.categoryPicker.classList.toggle("visible");
      });

      el.selectAllCategoriesBtn.addEventListener("click", () => {
        el.categoryList.querySelectorAll("input[type='checkbox']").forEach((cb) => {
          cb.checked = true;
        });
        renderAllPanes();
      });

      el.clearAllCategoriesBtn.addEventListener("click", () => {
        el.categoryList.querySelectorAll("input[type='checkbox']").forEach((cb) => {
          cb.checked = false;
        });
        renderAllPanes();
      });
    }

    async function init() {
      try {
        const response = await fetch("./notes.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Could not load notes.json (HTTP ${response.status})`);
        }

        const data = await response.json();

        state.title = data.title || "JEE Notes Helper";
        state.description = data.description || "";
        state.chapters = Array.isArray(data.chapters) ? data.chapters : [];
        state.terms = normalizeTerms(state.chapters);
        state.categories = buildCategories(state.terms);

        el.notesTitle.textContent = state.title;
        el.notesDescription.textContent = state.description;

        renderCategoryPicker();
        attachEvents();
        renderAllPanes();
      } catch (err) {
        showError("Failed to load notes.json. Open this app via a local web server (not file://) so fetch can read JSON.");
        el.notesTitle.textContent = "JEE Notes Helper";
        el.notesDescription.textContent = "Could not initialize notes data.";
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
